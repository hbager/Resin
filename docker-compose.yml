services:
  resin:
    build: .
    image: resin:scoring
    container_name: resin
    restart: unless-stopped
    environment:
      RESIN_AUTH_VERSION: "V1"
      RESIN_ADMIN_TOKEN: "${RESIN_ADMIN_TOKEN:?set RESIN_ADMIN_TOKEN}"
      RESIN_PROXY_TOKEN: "${RESIN_PROXY_TOKEN:?set RESIN_PROXY_TOKEN}"
      RESIN_LISTEN_ADDRESS: 0.0.0.0
      RESIN_PORT: 2260
      RESIN_DEFAULT_PLATFORM_ALLOCATION_POLICY: "PREFER_LOW_LATENCY"
    ports:
      - "2260:2260"
    volumes:
      - ./data/cache:/var/cache/resin
      - ./data/state:/var/lib/resin
      - ./data/log:/var/log/resin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2260/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
